name: spotify

on:
  schedule:
    # every 5 minutes
    - cron: "*/5 * * * *"
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # Writes your currently-playing track into the README between
      # the <!-- SPOTIFY:START --> and <!-- SPOTIFY:END --> markers.
      #
      # One-time setup — you'll need a Spotify app and refresh token:
      #   1. Create an app at https://developer.spotify.com/dashboard
      #   2. Follow the token flow at https://benwiz.com/notes/create-spotify-refresh-token/
      #   3. Add these repo secrets (Settings → Secrets → Actions):
      #        SPOTIFY_CLIENT_ID
      #        SPOTIFY_CLIENT_SECRET
      #        SPOTIFY_REFRESH_TOKEN
      - name: now-playing → README
        uses: kittinan/spotify-readme@v1
        with:
          spotify_client_id:     ${{ secrets.SPOTIFY_CLIENT_ID }}
          spotify_client_secret: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          spotify_refresh_token: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
          # the marker names match the README
          readme_section_start:  "<!-- SPOTIFY:START -->"
          readme_section_end:    "<!-- SPOTIFY:END -->"

      - name: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore(spotify): update now-playing"
          git push
