<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340" width="760" height="340" role="img" aria-label="whoami - terminal">

  <style>
    /* palette */
    .term-bg  { fill: #f4f0e8; }
    .term-chr { fill: #ece7dc; }
    .line-s   { stroke: #d9d3c6; fill: none; }
    .ink      { fill: #1a1a1a; }
    .faded    { fill: #928d84; }
    .muted    { fill: #5e5a54; }
    .accent   { fill: #c24e2c; }

    /* type */
    .mono { font-family: ui-monospace, 'Cascadia Code', 'Fira Mono', monospace; font-size: 12px; }

    /* staggered line reveal */
    .l1,.l2,.l3,.l4,.l5,.l6,.l7,.l8,.l9,.l10,.l11 {
      opacity: 0;
      animation: appear 0.25s ease forwards;
    }
    .l1  { animation-delay: 0.10s; }
    .l2  { animation-delay: 0.55s; }
    .l3  { animation-delay: 0.75s; }
    .l4  { animation-delay: 1.20s; }
    .l5  { animation-delay: 1.60s; }
    .l6  { animation-delay: 1.80s; }
    .l7  { animation-delay: 2.00s; }
    .l8  { animation-delay: 2.25s; }
    .l9  { animation-delay: 2.70s; }
    .l10 { animation-delay: 3.00s; }
    .l11 { animation-delay: 3.30s; }

    @keyframes appear {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
  </style>

  <!-- chrome -->
  <rect class="term-bg" width="760" height="340" rx="8" fill="#f4f0e8"></rect>
  <rect class="term-chr" width="760" height="32" rx="8" fill="#ece7dc"></rect>
  <rect class="term-chr" y="24" width="760" height="8" fill="#ece7dc"></rect>
  <line class="line-s" x1="0" y1="32" x2="760" y2="32" stroke-width="1"></line>

  <!-- traffic lights -->
  <circle cx="18" cy="16" r="5" fill="#e06a5a"></circle>
  <circle cx="36" cy="16" r="5" fill="#d4b15e"></circle>
  <circle cx="54" cy="16" r="5" fill="#8ca87a"></circle>
  <text class="mono faded" x="380" y="21" text-anchor="middle">~/astoris - zsh - 80x24</text>

  <!-- session -->
  <g>
    <text class="mono l1" x="20" y="70">
      <tspan class="accent" font-weight="600">astoris@metal</tspan><tspan class="faded"> :</tspan><tspan class="muted"> ~ </tspan><tspan class="faded">$</tspan><tspan class="ink" dx="6">whoami</tspan>
    </text>
    <text class="mono l2 ink" x="20" y="92">astoris - backend developer</text>
    <text class="mono l3 muted" x="20" y="110">mild procrastination habit · utc +5</text>

    <text class="mono l4" x="20" y="146">
      <tspan class="accent" font-weight="600">astoris@metal</tspan><tspan class="faded"> :</tspan><tspan class="muted"> ~ </tspan><tspan class="faded">$</tspan><tspan class="ink" dx="6">cat philosophy.md</tspan>
    </text>
    <text class="mono l5 muted" x="20" y="168">keep it boring in prod.</text>
    <text class="mono l6 muted" x="20" y="186">say what you do.</text>
    <text class="mono l7 muted" x="20" y="204">do what you say.</text>
    <text class="mono l8 ink" x="20" y="228">-> the query plan never lies.</text>

    <text class="mono l9" x="20" y="264">
      <tspan class="accent" font-weight="600">astoris@metal</tspan><tspan class="faded"> :</tspan><tspan class="muted"> ~ </tspan><tspan class="faded">$</tspan><tspan class="ink" dx="6">ls ~/now</tspan>
    </text>
    <text class="mono l10 muted" x="20" y="286">apis/  databases/  services/</text>

    <text class="mono l11" x="20" y="316">
      <tspan class="accent" font-weight="600">astoris@metal</tspan><tspan class="faded"> :</tspan><tspan class="muted"> ~ </tspan><tspan class="faded">$</tspan><tspan class="ink accent" dx="6">█</tspan>
    </text>
  </g>
</svg>
